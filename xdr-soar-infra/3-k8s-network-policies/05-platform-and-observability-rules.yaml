apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-supabase-component-egress
  namespace: xdr-soar
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - supabase-rest
      - supabase-auth
      - supabase-meta
      - supabase-studio
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: supabase-db
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - podSelector:
        matchLabels:
          app: supabase-meta
    ports:
    - protocol: TCP
      port: 8080
