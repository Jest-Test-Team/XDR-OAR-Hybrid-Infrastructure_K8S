apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-public-web-ingress
  namespace: xdr-soar
spec:
  podSelector:
    matchExpressions:
    - key: app
      operator: In
      values:
      - admin-ui
      - soar-ui
      - grafana
      - supabase-studio
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 80
    - protocol: TCP
      port: 3000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-supabase-gateway-ingress
  namespace: xdr-soar
spec:
  podSelector:
    matchLabels:
      app: supabase-gateway
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 8000
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
