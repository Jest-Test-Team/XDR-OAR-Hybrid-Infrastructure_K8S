apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kafka-ingress
  namespace: xdr-soar
spec:
  podSelector:
    matchLabels:
      app: kafka
  policyTypes:
  - Ingress
  ingress:
  - from:
    - podSelector:
        matchLabels:
          app: detection-engine
    - podSelector:
        matchLabels:
          app: triton-server
    - podSelector:
        matchLabels:
          app: yara-scanner
    - podSelector:
        matchLabels:
          app: ml-retraining
    - podSelector:
        matchLabels:
          app: mqtt-broker
    ports:
    - protocol: TCP
      port: 9092
---
