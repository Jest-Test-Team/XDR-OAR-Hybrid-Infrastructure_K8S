apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-detection-engine-egress
  namespace: xdr-soar
spec:
  podSelector:
    matchLabels:
      app: detection-engine
  policyTypes:
  - Egress
  egress:
  - to:
    - podSelector:
        matchLabels:
          app: kafka
    ports:
    - protocol: TCP
      port: 9092
  - to:
    - podSelector:
        matchLabels:
          app: influxdb
    ports:
    - protocol: TCP
      port: 8086
  - to:
    - podSelector:
        matchLabels:
          app: supabase
    ports:
    - protocol: TCP
      port: 5432
---
