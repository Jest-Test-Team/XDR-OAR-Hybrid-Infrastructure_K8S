apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka-cluster
  namespace: xdr-soar
spec:
  serviceName: "kafka"
  replicas: 3
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      containers:
      - name: kafka
        image: confluentinc/cp-kafka:latest
