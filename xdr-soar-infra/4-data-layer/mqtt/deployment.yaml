apiVersion: apps/v1
kind: Deployment
metadata:
  name: mqtt-broker
  namespace: xdr-soar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mqtt-broker
  template:
    metadata:
      labels:
        app: mqtt-broker
    spec:
      containers:
      - name: emqx
        image: emqx/emqx:5.0
        ports:
        - containerPort: 1883
        - containerPort: 8883 # TLS
