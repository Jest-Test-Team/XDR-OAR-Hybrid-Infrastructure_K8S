apiVersion: apps/v1
kind: Deployment
metadata:
  name: supabase-rest
  namespace: xdr-soar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supabase-rest
  template:
    metadata:
      labels:
        app: supabase-rest
    spec:
      containers:
      - name: postgrest
        image: postgrest/postgrest:v12.0.2
        ports:
        - containerPort: 3000
        env:
        - name: PGRST_DB_URI
          value: postgres://postgres:change-me@supabase-db:5432/postgres
        - name: PGRST_DB_SCHEMA
          value: public
        - name: PGRST_DB_ANON_ROLE
          value: anon
        - name: PGRST_JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: xdr-soar-data-layer
              key: supabase-jwt-secret
        - name: PGRST_SERVER_PORT
          value: "3000"
