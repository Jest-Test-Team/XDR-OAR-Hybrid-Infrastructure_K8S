apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: supabase-db
  namespace: xdr-soar
spec:
  serviceName: supabase-db
  replicas: 1
  selector:
    matchLabels:
      app: supabase-db
  template:
    metadata:
      labels:
        app: supabase-db
    spec:
      containers:
      - name: postgres
        image: supabase/postgres:15.1.1.78
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: xdr-soar-data-layer
              key: supabase-db-user
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: xdr-soar-data-layer
              key: supabase-db-password
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: xdr-soar-data-layer
              key: supabase-db-name
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
        - name: initdb
          mountPath: /docker-entrypoint-initdb.d
        readinessProbe:
          exec:
            command:
            - pg_isready
            - -U
            - postgres
          initialDelaySeconds: 10
          periodSeconds: 10
      volumes:
      - name: initdb
        configMap:
          name: supabase-db-init
  volumeClaimTemplates:
  - metadata:
      name: postgres-data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 10Gi
