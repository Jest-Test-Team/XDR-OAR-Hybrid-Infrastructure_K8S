# MongoDB 用於儲存 .pt 模型與 Agent 韌體 (GridFS)
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mongodb
  namespace: xdr-soar
spec:
  serviceName: "mongodb"
  replicas: 1
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:6.0
