stages:
  - validate
  - build
  - push
  - notify_update

validate_terraform:
  stage: validate
  image: hashicorp/terraform:1.8.5@sha256:c2de8d7f1919b8e534c4e7cb92c2b327baafd87010d5a3bba036da05caa12db0
  script:
    - cd xdr-soar-infra/1-vmware-esxi
    - terraform init -backend=false -input=false
    - terraform validate

validate_infra:
  stage: validate
  script:
    - bash xdr-soar-infra/8-scripts/validate-config.sh

build_internal_images:
  stage: build
  tags: [isolated-runner]
  script:
    - echo "Building internal application images..."
    - bash xdr-soar-infra/8-scripts/build-images.sh

build_agent:
  stage: build
  tags: [isolated-runner]
  script:
    - echo "Building Windows EDR Agent..."
    - pyinstaller --onefile xdr-soar-infra/agent_main.py --name agent --distpath dist

push_to_mongodb:
  stage: push
  script:
    - export AGENT_VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - export AGENT_SHA256="$(sha256sum ./dist/agent.exe | awk '{print $1}')"
    - echo "Uploading binary to MongoDB GridFS..."
    - python xdr-soar-infra/scripts/upload_to_gridfs.py ./dist/agent.exe --version "${AGENT_VERSION}" --sha256 "${AGENT_SHA256}"

notify_mqtt:
  stage: notify_update
  script:
    - export AGENT_VERSION="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - export AGENT_SHA256="$(sha256sum ./dist/agent.exe | awk '{print $1}')"
    - : "${MQTT_BROKER_HOST:?Set MQTT_BROKER_HOST in CI variables.}"
    - : "${MQTT_PORT:=8883}"
    - : "${MQTT_TOPIC:=/agent/update}"
    - : "${MQTT_USERNAME:?Set MQTT_USERNAME in CI variables.}"
    - : "${MQTT_PASSWORD:?Set MQTT_PASSWORD in CI variables.}"
    - |
      if [ -n "${MQTT_CA_FILE:-}" ]; then
        mosquitto_pub -h "$MQTT_BROKER_HOST" -p "$MQTT_PORT" --cafile "$MQTT_CA_FILE" \
          ${MQTT_TLS_INSECURE:+--insecure} \
          -u "$MQTT_USERNAME" -P "$MQTT_PASSWORD" \
          -t "$MQTT_TOPIC" -m "{\"action\":\"update\",\"version\":\"${AGENT_VERSION}\",\"sha256\":\"${AGENT_SHA256}\"}"
      else
        mosquitto_pub -h "$MQTT_BROKER_HOST" -p "$MQTT_PORT" \
          -u "$MQTT_USERNAME" -P "$MQTT_PASSWORD" \
          -t "$MQTT_TOPIC" -m "{\"action\":\"update\",\"version\":\"${AGENT_VERSION}\",\"sha256\":\"${AGENT_SHA256}\"}"
      fi
