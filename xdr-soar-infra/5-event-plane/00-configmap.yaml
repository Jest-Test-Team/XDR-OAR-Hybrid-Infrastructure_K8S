apiVersion: v1
kind: ConfigMap
metadata:
  name: event-plane-config
  namespace: xdr-soar
data:
  SCHEMA_VERSION: "1.0.0"
  KAFKA_BOOTSTRAP_SERVERS: "kafka:9092"
  MQTT_BROKER_HOST: "mqtt-broker"
  MQTT_BROKER_PORT: "1883"
  MQTT_TLS_PORT: "8883"
  EVENT_INGEST_PATH: "/ingest"
  MQ_BRIDGE_INPUT_TOPIC: "telemetry.raw"
  MQ_BRIDGE_OUTPUT_TOPIC: "telemetry.normalized"
  STREAM_PROCESSOR_SOURCE_TOPIC: "telemetry.normalized"
  STREAM_PROCESSOR_SINK_TOPIC: "telemetry.enriched"
