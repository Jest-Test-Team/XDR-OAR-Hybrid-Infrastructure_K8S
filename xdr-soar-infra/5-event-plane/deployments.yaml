        app: stream-processor
    spec:
      containers:
      - name: stream-processor
        image: stream-processor:v1.0.0
        env:
        - name: PORT
          value: "8094"
        - name: SOURCE_TOPIC
          valueFrom:
            configMapKeyRef:
              name: event-plane-config
              key: STREAM_PROCESSOR_SOURCE_TOPIC
        - name: SINK_TOPIC
          valueFrom:
            configMapKeyRef:
              name: event-plane-config
              key: STREAM_PROCESSOR_SINK_TOPIC
        - name: SCHEMA_VERSION
          valueFrom:
            configMapKeyRef:
              name: event-plane-config
              key: SCHEMA_VERSION
        - name: KAFKA_BOOTSTRAP_SERVERS
          valueFrom:
            configMapKeyRef:
              name: event-plane-config
              key: KAFKA_BOOTSTRAP_SERVERS
        ports:
        - containerPort: 8094
        readinessProbe:
          httpGet:
            path: /health
            port: 8094
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
