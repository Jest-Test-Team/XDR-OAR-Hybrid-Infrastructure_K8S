apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: xdr-soar
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
    scrape_configs:
      - job_name: detection-engine
        metrics_path: /metrics
        static_configs:
          - targets: ['detection-engine:8080']
      - job_name: yara-scanner
        metrics_path: /metrics
        static_configs:
          - targets: ['yara-scanner:9000']
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: xdr-soar
data:
  config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
    common:
      replication_factor: 1
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      ring:
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2024-01-01
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    ruler:
      alertmanager_url: http://localhost:9093
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: xdr-soar
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: xdr-soar
data:
  config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0
    positions:
      filename: /tmp/positions.yaml
    clients:
      - url: http://loki:3100/loki/api/v1/push
    scrape_configs:
      - job_name: varlogs
        static_configs:
          - targets:
              - localhost
            labels:
              job: varlogs
              __path__: /var/log/**/*.log
