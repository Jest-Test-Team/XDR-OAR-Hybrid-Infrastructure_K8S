apiVersion: apps/v1
kind: Deployment
metadata:
  name: detection-engine
  namespace: xdr-soar
spec:
  replicas: 2
  selector:
    matchLabels:
      app: engine
  template:
    metadata:
      labels:
        app: engine
    spec:
      containers:
      - name: rules-engine
        image: custom-engine:latest
        env:
        - name: INFLUXDB_URL
          value: "http://influxdb:8086"
