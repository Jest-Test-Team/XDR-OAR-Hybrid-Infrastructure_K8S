apiVersion: apps/v1
kind: Deployment
metadata:
  name: soar-api
  namespace: xdr-soar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soar-api
  template:
    metadata:
      labels:
        app: soar-api
    spec:
      containers:
      - name: soar-api
        image: soar-api:v1.0.0
        env:
        - name: PORT
          value: "8085"
        - name: KAFKA_ENABLED
          value: "true"
        - name: KAFKA_BROKERS
          value: "kafka:9092"
        - name: KAFKA_INCIDENT_TOPIC
          value: "detections.incidents"
        - name: KAFKA_GROUP_ID
          value: "soar-api"
        - name: SUPABASE_INCIDENTS_URL
          value: "http://supabase/rest/v1/incidents"
        - name: SUPABASE_PLAYBOOKS_URL
          value: "http://supabase/rest/v1/playbooks"
        - name: SUPABASE_COMMANDS_URL
          value: "http://supabase/rest/v1/commands"
        - name: SUPABASE_APPROVALS_URL
          value: "http://supabase/rest/v1/approvals"
        - name: SUPABASE_AUDIT_URL
          value: "http://supabase/rest/v1/audit_logs"
        - name: SUPABASE_API_KEY
          valueFrom:
            secretKeyRef:
              name: xdr-soar-data-layer
              key: supabase-service-role-key
        ports:
        - containerPort: 8085
        readinessProbe:
          httpGet:
            path: /health
            port: 8085
          initialDelaySeconds: 5
          periodSeconds: 10
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: soar-api
  namespace: xdr-soar
spec:
  ports:
  - port: 8085
    targetPort: 8085
  selector:
    app: soar-api
