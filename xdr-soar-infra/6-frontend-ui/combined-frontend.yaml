apiVersion: apps/v1
kind: Deployment
metadata:
  name: admin-panel
  namespace: xdr-soar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: admin-ui
  template:
    metadata:
      labels:
        app: admin-ui
    spec:
      containers:
      - name: admin
        image: admin-frontend:v1.0.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: admin-panel
  namespace: xdr-soar
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: admin-ui
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: soar-dashboard
  namespace: xdr-soar
spec:
  replicas: 1
  selector:
    matchLabels:
      app: soar-ui
  template:
    metadata:
      labels:
        app: soar-ui
    spec:
      containers:
      - name: frontend
        image: soar-frontend:v1.0.0
        ports:
        - containerPort: 80
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 128Mi
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: soar-dashboard
  namespace: xdr-soar
spec:
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: soar-ui
