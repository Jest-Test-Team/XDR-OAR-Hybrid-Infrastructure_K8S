apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xdr-soar-ui
  namespace: xdr-soar
spec:
  ingressClassName: nginx
  rules:
  - host: admin.xdr-soar.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 80
  - host: dashboard.xdr-soar.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: soar-dashboard
            port:
              number: 80
  - host: grafana.xdr-soar.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
  - host: studio.xdr-soar.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: supabase-studio
            port:
              number: 3000
  - host: supabase.xdr-soar.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: supabase
            port:
              number: 8000
  - host: api.xdr-soar.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: firmware-api
            port:
              number: 8081
