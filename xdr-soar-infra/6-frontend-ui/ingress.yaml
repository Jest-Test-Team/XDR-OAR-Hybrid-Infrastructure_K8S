apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: xdr-soar-ui
  namespace: xdr-soar
  annotations:
    cert-manager.io/cluster-issuer: ${XDR_SOAR_CERT_MANAGER_CLUSTER_ISSUER}
spec:
  ingressClassName: ${XDR_SOAR_INGRESS_CLASS}
  tls:
  - secretName: ${XDR_SOAR_TLS_SECRET_NAME}
    hosts:
    - ${XDR_SOAR_ADMIN_HOST}
    - ${XDR_SOAR_DASHBOARD_HOST}
    - ${XDR_SOAR_GRAFANA_HOST}
    - ${XDR_SOAR_STUDIO_HOST}
    - ${XDR_SOAR_SUPABASE_HOST}
    - ${XDR_SOAR_API_HOST}
  rules:
  - host: ${XDR_SOAR_ADMIN_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: admin-panel
            port:
              number: 80
  - host: ${XDR_SOAR_DASHBOARD_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: soar-dashboard
            port:
              number: 80
  - host: ${XDR_SOAR_GRAFANA_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: grafana
            port:
              number: 3000
  - host: ${XDR_SOAR_STUDIO_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: supabase-studio
            port:
              number: 3000
  - host: ${XDR_SOAR_SUPABASE_HOST}
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: supabase
            port:
              number: 8000
  - host: ${XDR_SOAR_API_HOST}
    http:
      paths:
      - path: /api/v1/incidents
        pathType: Prefix
        backend:
          service:
            name: soar-api
            port:
              number: 8085
      - path: /api/v1/playbooks
        pathType: Prefix
        backend:
          service:
            name: soar-api
            port:
              number: 8085
      - path: /api/v1/commands
        pathType: Prefix
        backend:
          service:
            name: soar-api
            port:
              number: 8085
      - path: /api/v1/approvals
        pathType: Prefix
        backend:
          service:
            name: soar-api
            port:
              number: 8085
      - path: /api/v1/approvals/
        pathType: Prefix
        backend:
          service:
            name: soar-api
            port:
              number: 8085
      - path: /api/v1/commands/
        pathType: Prefix
        backend:
          service:
            name: soar-api
            port:
              number: 8085
      - path: /api/v1/health
        pathType: Prefix
        backend:
          service:
            name: soar-api
            port:
              number: 8085
      - path: /
        pathType: Prefix
        backend:
          service:
            name: firmware-api
            port:
              number: 8081
